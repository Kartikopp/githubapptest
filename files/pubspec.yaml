name: gupta_classes
description: Professional online learning app for Gupta Classes Meerut
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # Firebase
  firebase_core: ^2.24.0
  firebase_auth: ^4.17.0
  cloud_firestore: ^4.14.0
  firebase_storage: ^11.5.0
  firebase_messaging: ^14.7.0
  
  # State Management
  provider: ^6.0.0
  riverpod: ^2.4.0
  
  # Video Player
  video_player: ^2.8.1
  chewie: ^1.8.0
  
  # Payment
  upi_india: ^1.1.0
  razorpay_flutter: ^1.3.7
  
  # UI & Design
  google_fonts: ^6.1.0
  flutter_svg: ^2.0.7
  smooth_page_indicator: ^1.1.0
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  
  # Authentication
  google_sign_in: ^6.2.0
  
  # Local Storage
  shared_preferences: ^2.2.2
  sqflite: ^2.3.0
  
  # HTTP & API
  dio: ^5.3.1
  http: ^1.1.0
  
  # Image & File Handling
  image_picker: ^1.0.4
  file_picker: ^6.1.1
  permission_handler: ^11.4.4
  
  # Notifications
  flutter_local_notifications: ^14.1.1
  
  # Others
  intl: ^0.19.0
  connectivity_plus: ^5.0.1
  logger: ^2.0.1
  url_launcher: ^6.1.14
  whatsapp_share: ^1.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
    - assets/icons/
    - assets/fonts/
  
  fonts:
    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins-Regular.ttf
        - asset: assets/fonts/Poppins-Bold.ttf
          weight: 700
        - asset: assets/fonts/Poppins-SemiBold.ttf
          weight: 600